<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মেধা কুইজ - প্রফেশনাল এডমিন প্যানেল ভার্সন</title>
    <!-- Tailwind CSS এবং Chart.js লাইব্রেরি -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; -webkit-tap-highlight-color: transparent; }
        .app-container { max-width: 480px; min-height: 100vh; margin: 0 auto; background-color: #ffffff; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body>

    <!-- ਫਾਇਰਬੇਸ ਕਨੈਕਸ਼ਨ ਸਕ੍ਰਿਪਟ (ফায়ারবেস SDK v9 মডিউল) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // !!! এখানে আপনার ফায়ারবেস কনসোল থেকে পাওয়া কি (Keys) গুলো বসাবেন !!!
        

        // ফায়ারবেস সচল করা
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // গ্লোবাল উইন্ডোতে অবজেক্টগুলো যুক্ত করা যাতে সাধারণ স্ক্রিপ্ট থেকে অ্যাক্সেস করা যায়
        window.db = db;
        window.collection = collection;
        window.addDoc = addDoc;
        window.getDocs = getDocs;
        window.query = query;
        window.orderBy = orderBy;
        window.limit = limit;

        // অ্যাপ চালু হওয়া মাত্রই ফায়ারবেস থেকে লাইভ প্রশ্ন লোড হবে
        fetchLiveQuestions();
    </script>

    <div class="app-container flex flex-col justify-between p-6 relative">
        
        <!-- ================= LOGIN SCREEN ================= -->
        <div id="login-screen" class="flex-grow flex flex-col justify-center items-center gap-6">
            <div class="w-24 h-24 bg-indigo-600 rounded-3xl flex items-center justify-center shadow-lg shadow-indigo-200">
                <span class="text-white text-4xl font-bold">মেধা</span>
            </div>
            <div class="text-center">
                <h1 class="text-2xl font-bold text-gray-800">চাকরি প্রস্তুতি কুইজ</h1>
                <p class="text-gray-500 text-sm mt-1">লাইভ ডাটাবেস ও প্রফেশনাল এডমিন প্যানেল</p>
            </div>
            <div class="w-full mt-4">
                <label class="block text-gray-600 text-sm font-medium mb-2">আপনার নাম লিখুন</label>
                <input type="text" id="username-input" placeholder="যেমন: মোহিদুর রহমান" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-gray-800">
                
                <button onclick="loginUser()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl mt-4 transition duration-200 shadow-lg shadow-indigo-200">
                    পরীক্ষা শুরু করুন
                </button>
            </div>

            <!-- গোপন এডমিন প্যানেল বাটন -->
            <button onclick="showAdminLogin()" class="mt-8 text-xs text-gray-400 hover:text-indigo-600 underline transition">
                🛠 এডমিন প্যানেলে লগইন করুন
            </button>
        </div>

        <!-- ================= ADMIN LOGIN SCREEN ================= -->
        <div id="admin-login-screen" class="hidden flex-grow flex flex-col justify-center items-center gap-4">
            <h2 class="text-xl font-bold text-gray-800">এডমিন ভেরিফিকেশন</h2>
            <div class="w-full">
                <input type="password" id="admin-pass-input" placeholder="গোপন পাসওয়ার্ড দিন" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500 text-gray-800">
                <button onclick="verifyAdmin()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded-xl mt-3 transition">
                    প্রবেশ করুন
                </button>
                <button onclick="backToLogin()" class="w-full bg-gray-200 text-gray-700 font-medium py-2 px-4 rounded-xl mt-2 text-sm">
                    ফিরে যান
                </button>
            </div>
        </div>

        <!-- ================= ADMIN DASHBOARD ================= -->
        <div id="admin-dashboard" class="hidden flex-grow flex flex-col overflow-y-auto max-h-[92vh]">
            <div class="flex justify-between items-center border-b pb-3 mb-4">
                <h2 class="text-lg font-bold text-red-600">🛠 নতুন প্রশ্ন যুক্ত করুন</h2>
                <button onclick="backToLogin()" class="bg-gray-800 text-white text-xs px-3 py-1 rounded-lg">লগআউট</button>
            </div>
            
            <div class="flex flex-col gap-3 text-sm">
                <div>
                    <label class="block text-gray-600 mb-1 font-medium">প্রশ্নটি লিখুন:</label>
                    <textarea id="adm-q-text" rows="2" class="w-full px-3 py-2 border rounded-xl focus:ring-2 focus:ring-indigo-500" placeholder="যেমন: বাংলাদেশের স্বাধীনতা দিবস কবে?"></textarea>
                </div>
                <div>
                    <label class="block text-gray-600 mb-1 font-medium">অপশন A:</label>
                    <input type="text" id="adm-opt-a" class="w-full px-3 py-2 border rounded-xl">
                </div>
                <div>
                    <label class="block text-gray-600 mb-1 font-medium">অপশন B:</label>
                    <input type="text" id="adm-opt-b" class="w-full px-3 py-2 border rounded-xl">
                </div>
                <div>
                    <label class="block text-gray-600 mb-1 font-medium">অপশন C:</label>
                    <input type="text" id="adm-opt-c" class="w-full px-3 py-2 border rounded-xl">
                </div>
                <div>
                    <label class="block text-gray-600 mb-1 font-medium">অপশন D:</label>
                    <input type="text" id="adm-opt-d" class="w-full px-3 py-2 border rounded-xl">
                </div>
                <div>
                    <label class="block text-gray-600 mb-1 font-medium">সঠিক উত্তর নির্বাচন করুন:</label>
                    <select id="adm-correct" class="w-full px-3 py-2 border rounded-xl bg-white">
                        <option value="Option A">Option A</option>
                        <option value="Option B">Option B</option>
                        <option value="Option C">Option C</option>
                        <option value="Option D">Option D</option>
                    </select>
                </div>
                <div>
                    <label class="block text-gray-600 mb-1 font-medium">ব্যাখ্যা (ঐচ্ছিক):</label>
                    <textarea id="adm-explain" rows="2" class="w-full px-3 py-2 border rounded-xl" placeholder="উত্তরটির সঠিক ব্যাখ্যা দিন..."></textarea>
                </div>
                <div>
                    <label class="block text-gray-600 mb-1 font-medium">ক্যাটাগরি:</label>
                    <input type="text" id="adm-cat" value="সাধারণ জ্ঞান" class="w-full px-3 py-2 border rounded-xl">
                </div>
                
                <button onclick="submitQuestionToFirebase()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl mt-2 shadow-md transition">
                    🚀 ডাটাবেসে সেভ করুন
                </button>
            </div>
        </div>

        <!-- ================= QUIZ SCREEN ================= -->
        <div id="quiz-screen" class="hidden flex-grow flex flex-col justify-between">
            <div class="flex justify-between items-center pb-4 border-b">
                <div>
                    <span id="user-display" class="text-sm font-semibold text-indigo-600">ইউজার</span>
                    <h2 class="text-xs text-gray-400" id="category-display">সাধারণ জ্ঞান</h2>
                </div>
                <div class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full text-xs font-bold" id="question-counter">
                    ০/০
                </div>
            </div>

            <div class="my-6">
                <h3 id="question-text" class="text-lg font-bold text-gray-800 leading-snug">প্রশ্ন ডাটাবেস থেকে লোড হচ্ছে...</h3>
            </div>

            <div class="flex flex-col gap-3" id="options-container"></div>

            <div id="explanation-box" class="hidden mt-6 p-4 bg-amber-50 border border-amber-200 rounded-xl">
                <span class="text-xs font-bold text-amber-800 block mb-1">💡 ব্যাখ্যা:</span>
                <p id="explanation-text" class="text-sm text-gray-700"></p>
            </div>

            <div class="mt-6">
                <button id="next-btn" onclick="nextQuestion()" class="hidden w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl transition duration-200">
                    পরবর্তী প্রশ্ন
                </button>
            </div>
        </div>

        <!-- ================= RESULT & LEADERBOARD SCREEN ================= -->
        <div id="result-screen" class="hidden flex-grow flex flex-col justify-between overflow-y-auto max-h-[90vh]">
            <div class="text-center py-4">
                <h2 class="text-xl font-bold text-gray-800">পরীক্ষা সম্পন্ন হয়েছে!</h2>
                <div class="text-2xl font-extrabold text-indigo-600 mt-2" id="final-score">স্কোর: ০</div>
                
                <div class="flex justify-around my-4 text-sm font-semibold">
                    <span class="text-green-600">✅ সঠিক: <span id="correct-count">০</span></span>
                    <span class="text-red-600">❌ ভুল: <span id="wrong-count">০</span></span>
                    <span class="text-orange-600">📉 নেগেটিভ: <span id="negative-count">০</span></span>
                </div>

                <div class="w-36 h-36 mx-auto my-2">
                    <canvas id="resultChart"></canvas>
                </div>
            </div>

            <!-- লিডারবোর্ড -->
            <div class="flex-grow mt-2">
                <h3 class="text-sm font-bold text-gray-700 mb-2 flex items-center gap-2">
                    🏆 গ্লোবাল লিডারবোর্ড (শীর্ষ ১০ জন)
                </h3>
                <div class="max-h-48 overflow-y-auto border border-gray-100 rounded-xl" id="leaderboard-list">
                    <p class="text-center text-xs text-gray-400 p-4">লোড হচ্ছে...</p>
                </div>
            </div>

            <button onclick="restartQuiz()" class="w-full bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 px-4 rounded-xl mt-4 transition duration-200">
                আবার পরীক্ষা দিন
            </button>
        </div>

    </div>

    <!-- ================= APP LOGIC (JAVASCRIPT) ================= -->
    <script>
        let questions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let correctAnswers = 0;
        let wrongAnswers = 0;
        let currentUser = "";
        let answered = false;
        let chartInstance = null;
        
        // আপনার গোপন এডমিন পাসওয়ার্ড (এটি পরিবর্তন করে নিতে পারেন)
        const ADMIN_PASSWORD = "admin123"; 

        // ১. ফায়ারবেস ফায়ারস্টোর থেকে লাইভ প্রশ্ন সংগ্রহ করা
        async function fetchLiveQuestions() {
            if (!window.db) {
                setTimeout(fetchLiveQuestions, 500);
                return;
            }
            try {
                const querySnapshot = await window.getDocs(window.collection(window.db, "questions"));
                questions = [];
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    questions.push({
                        id: doc.id,
                        text: data.text,
                        optionA: data.optionA,
                        optionB: data.optionB,
                        optionC: data.optionC,
                        optionD: data.optionD,
                        correct: data.correct,
                        explanation: data.explanation || "",
                        category: data.category || "সাধারণ জ্ঞান"
                    });
                });
                console.log("ডাটাবেস থেকে সফলভাবে মোট প্রশ্ন এসেছে:", questions.length);
            } catch (error) {
                console.error("ফায়ারবেস থেকে প্রশ্ন আনা যায়নি:", error);
            }
        }

        // ২. এডমিন লগইন লজিক
        function showAdminLogin() {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("admin-login-screen").classList.remove("hidden");
        }

        function backToLogin() {
            document.getElementById("admin-login-screen").classList.add("hidden");
            document.getElementById("admin-dashboard").classList.add("hidden");
            document.getElementById("login-screen").classList.remove("hidden");
        }

        function verifyAdmin() {
            const pass = document.getElementById("admin-pass-input").value;
            if (pass === ADMIN_PASSWORD) {
                document.getElementById("admin-login-screen").classList.add("hidden");
                document.getElementById("admin-dashboard").classList.remove("hidden");
            } else {
                alert("ভুল পাসওয়ার্ড! আবার চেষ্টা করুন।");
            }
        }

        // ৩. এডমিন প্যানেল থেকে সরাসরি ফায়ারবেসে প্রশ্ন পাঠানো
        async function submitQuestionToFirebase() {
            const text = document.getElementById("adm-q-text").value.trim();
            const optionA = document.getElementById("adm-opt-a").value.trim();
            const optionB = document.getElementById("adm-opt-b").value.trim();
            const optionC = document.getElementById("adm-opt-c").value.trim();
            const optionD = document.getElementById("adm-opt-d").value.trim();
            const correct = document.getElementById("adm-correct").value;
            const explanation = document.getElementById("adm-explain").value.trim();
            const category = document.getElementById("adm-cat").value.trim();

            if (!text || !optionA || !optionB || !optionC || !optionD) {
                alert("দয়া করে প্রশ্ন এবং ৪টি অপশনই পূরণ করুন!");
                return;
            }

            try {
                await window.addDoc(window.collection(window.db, "questions"), {
                    text, optionA, optionB, optionC, optionD, correct, explanation, category,
                    createdAt: new Date()
                });
                alert("🎉 প্রশ্নটি সফলভাবে ডেটাবেসে স্থায়ীভাবে সেভ হয়েছে!");
                
                // ফর্ম রিসেট করা
                document.getElementById("adm-q-text").value = "";
                document.getElementById("adm-opt-a").value = "";
                document.getElementById("adm-opt-b").value = "";
                document.getElementById("adm-opt-c").value = "";
                document.getElementById("adm-opt-d").value = "";
                document.getElementById("adm-explain").value = "";
                
                // ব্যাকগ্রাউন্ডে প্রশ্ন তালিকা রিফ্রেশ করা
                fetchLiveQuestions();
            } catch (e) {
                alert("ত্রুটি হয়েছে: " + e.message);
            }
        }

        // ৪. ইউজার কুইজ ফাংশনসমূহ
        function loginUser() {
            const username = document.getElementById("username-input").value.trim();
            if (!username) { alert("দয়া করে আপনার নাম লিখুন!"); return; }
            if (questions.length === 0) { 
                alert("ডাটাবেসে কোনো প্রশ্ন পাওয়া যায়নি বা লোড হচ্ছে! এডমিন প্যানেল দিয়ে প্রথমে কিছু প্রশ্ন যুক্ত করুন।"); 
                return; 
            }
            
            currentUser = username;
            document.getElementById("user-display").innerText = currentUser;
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("quiz-screen").classList.remove("hidden");
            loadQuestion();
        }

        function loadQuestion() {
            answered = false;
            document.getElementById("next-btn").classList.add("hidden");
            document.getElementById("explanation-box").classList.add("hidden");

            const q = questions[currentQuestionIndex];
            document.getElementById("category-display").innerText = q.category;
            document.getElementById("question-counter").innerText = `${currentQuestionIndex + 1} / ${questions.length}`;
            document.getElementById("question-text").innerText = q.text;

            const optionsContainer = document.getElementById("options-container");
            optionsContainer.innerHTML = "";

            const opts = [
                { key: 'Option A', text: q.optionA },
                { key: 'Option B', text: q.optionB },
                { key: 'Option C', text: q.optionC },
                { key: 'Option D', text: q.optionD }
            ];

            opts.forEach(opt => {
                const btn = document.createElement("button");
                btn.className = "w-full text-left px-4 py-3 border-2 border-gray-100 rounded-xl font-medium text-gray-700 hover:bg-gray-50 transition duration-150 text-sm";
                btn.innerText = opt.text;
                btn.onclick = () => checkAnswer(btn, opt.key, q.correct, q.explanation);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedBtn, selectedKey, correctKey, explanation) {
            if (answered) return;
            answered = true;

            const buttons = document.getElementById("options-container").getElementsByTagName("button");
            const keys = ['Option A', 'Option B', 'Option C', 'Option D'];
            const correctIndex = keys.indexOf(correctKey);
            const selectedIndex = keys.indexOf(selectedKey);

            if (correctIndex !== -1) {
                buttons[correctIndex].classList.add("bg-green-100", "border-green-500", "text-green-800", "font-bold");
            }

            if (selectedKey === correctKey) {
                correctAnswers++;
            } else {
                wrongAnswers++;
                if (selectedIndex !== -1) {
                    buttons[selectedIndex].classList.add("bg-red-100", "border-red-500", "text-red-800");
                }
            }

            if (explanation) {
                document.getElementById("explanation-text").innerText = explanation;
                document.getElementById("explanation-box").classList.remove("hidden");
            }

            document.getElementById("next-btn").classList.remove("hidden");
        }

        function nextQuestion() {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                loadQuestion();
            } else {
                calculateAndSaveResult();
            }
        }

        async function calculateAndSaveResult() {
            document.getElementById("quiz-screen").classList.add("hidden");
            document.getElementById("result-screen").classList.remove("hidden");

            const negativeMarks = wrongAnswers * 0.5;
            const finalScore = (correctAnswers * 1) - negativeMarks;

            document.getElementById("correct-count").innerText = correctAnswers;
            document.getElementById("wrong-count").innerText = wrongAnswers;
            document.getElementById("negative-count").innerText = negativeMarks;
            document.getElementById("final-score").innerText = `প্রাপ্ত নম্বর: ${finalScore}`;

            renderChart(correctAnswers, wrongAnswers);

            if (window.db) {
                try {
                    await window.addDoc(window.collection(window.db, "leaderboard"), {
                        name: currentUser,
                        score: finalScore,
                        date: new Date()
                    });
                    loadGlobalLeaderboard();
                } catch (e) {
                    console.error("স্কোর সেভ করা যায়নি:", e);
                }
            }
        }

        async function loadGlobalLeaderboard() {
            const listContainer = document.getElementById("leaderboard-list");
            try {
                const q = window.query(
                    window.collection(window.db, "leaderboard"),
                    window.orderBy("score", "desc"),
                    window.limit(10)
                );
                const querySnapshot = await window.getDocs(q);
                listContainer.innerHTML = "";

                let index = 0;
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const item = document.createElement("div");
                    item.className = `flex justify-between items-center p-3 border-b border-gray-50 last:border-none ${data.name === currentUser ? 'bg-indigo-50 font-semibold' : ''}`;
                    
                    let rankBadge = `${index + 1}`;
                    if (index === 0) rankBadge = "🥇";
                    if (index === 1) rankBadge = "🥈";
                    if (index === 2) rankBadge = "🥉";

                    item.innerHTML = `
                        <div class="flex items-center gap-3">
                            <span class="w-6 text-center text-sm font-bold text-gray-500">${rankBadge}</span>
                            <span class="text-gray-800 text-sm">${data.name}</span>
                        </div>
                        <span class="text-indigo-600 text-sm font-bold">${data.score}</span>
                    `;
                    listContainer.appendChild(item);
                    index++;
                });
            } catch (e) {
                console.error("লিডারবোর্ড লোড করা যায়নি:", e);
            }
        }

        function renderChart(correct, wrong) {
            const ctx = document.getElementById('resultChart').getContext('2d');
            if (chartInstance) { chartInstance.destroy(); }
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['সঠিক', 'ভুল'],
                    datasets: [{
                        data: [correct, wrong],
                        backgroundColor: ['#22c55e', '#ef4444'],
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } }
                }
            });
        }

        function restartQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            correctAnswers = 0;
            wrongAnswers = 0;
            document.getElementById("result-screen").classList.add("hidden");
            document.getElementById("quiz-screen").classList.remove("hidden");
            loadQuestion();
        }
    </script>
</body>
</html>
